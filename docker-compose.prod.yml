services:
  backend:
    build: ./backend
    container_name: wc26-backend
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - wpnet

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://wc26-backend:8000
    container_name: wc26-frontend
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: http://wc26-backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - wpnet

networks:
  wpnet:
    external: true
    name: woo-fresh_wpnet
